                    <input type="number" min={1} value={manualForm.qty}
                      onChange={e=>setManualForm(f=>({...f,qty:parseInt(e.target.value)||""}))}
                      placeholder="e.g. 240" style={{...S.input,width:"100%"}}/>
                    {manualForm.qty&&pqOk&&psOk&&(
                      <div style={{fontSize:10,color:C.green,marginTop:4}}>
                        {((Number(manualForm.qty)/Number(manualForm.palletQty))*Number(manualForm.palletSpc)).toFixed(2)} pallets
                      </div>
                    )}
                  </div>

                  {/* Arrival Date */}
                  <div style={{minWidth:140}}>
                    <div style={{fontSize:10,color:C.muted,marginBottom:4}}>Arrival Date</div>
                    <input type="date" value={manualForm.arrivalDate}
                      onChange={e=>setManualForm(f=>({...f,arrivalDate:e.target.value}))}
                      style={{...S.input,width:"100%"}}/>
                    {manualForm.arrivalDate&&(
                      <div style={{fontSize:10,color:C.green,marginTop:4}}>
                        Ready: {nextWorkday(addDays(manualForm.arrivalDate,turnaround))}
                      </div>
                    )}
                  </div>

                  <div style={{alignSelf:"flex-end",paddingBottom:1}}>
                    <button onClick={()=>{
                      const {sku,name,qty,arrivalDate,palletQty,palletSpc}=manualForm;
                      if(!sku||!qty||!arrivalDate) return;
                      const pq=parseFloat(palletQty)||0;
                      const ps=parseFloat(palletSpc)||0;
                      if(pq>0&&ps>0)
                        setNomenclature(prev=>({...prev,[sku]:{...(prev[sku]||{}),name:name||prev[sku]?.name||sku,palletQty:pq,palletSpc:ps,source:prev[sku]?.source||"manual"}}));
                      setManualArrivals(prev=>[...prev,{sku,qty:Number(qty),arrivalDate,palletQty:pq,palletSpc:ps,name:name||nomenclature[sku]?.name||sku,id:Date.now()}]);
                      setManualForm({sku:"",name:"",qty:"",arrivalDate:"",palletQty:"",palletSpc:"",search:"",showDropdown:false});

                    }} disabled={!canAdd}
                    style={{background:canAdd?"linear-gradient(135deg,#2563eb,#7c3aed)":"#e2e8f0",
                      color:canAdd?"#fff":C.muted,border:"none",borderRadius:7,padding:"9px 20px",
                      fontFamily:"inherit",fontSize:12,fontWeight:600,cursor:canAdd?"pointer":"not-allowed",whiteSpace:"nowrap"}}>
                      ➕ Add
                    </button>
                  </div>
                </div>

                {manualArrivals.length>0&&(
                  <div style={{marginTop:14,borderTop:`1px solid ${C.border}`,paddingTop:12}}>
                    <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",marginBottom:8}}>
                      Manually added — {manualArrivals.length} entr{manualArrivals.length===1?"y":"ies"}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {manualArrivals.map((m,i)=>{
                        const nom=nomenclature[m.sku];
                        const readyDate=nextWorkday(addDays(m.arrivalDate,turnaround));
                        const pq=m.palletQty||nom?.palletQty||0;
                        const ps=m.palletSpc||nom?.palletSpc||0;
                        const pal=pq>0&&ps>0?(m.qty/pq)*ps:0;
                        return(
                          <div key={m.id||i} style={{display:"flex",alignItems:"center",gap:12,
                            background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 14px",flexWrap:"wrap"}}>
                            <span style={{fontFamily:"monospace",fontSize:11,color:"#7c3aed",fontWeight:700,minWidth:120}}>{m.sku}</span>
                            <span style={{fontSize:11,color:C.textSec,flex:1,minWidth:120}}>{m.name||nom?.name||<span style={{color:C.amber}}>unknown</span>}</span>
                            <span style={{fontSize:11,color:C.muted}}>{pq>0?`${pq} u/pal · ${ps} spc`:<span style={{color:C.red}}>no pallet data</span>}</span>
                            <span style={{fontSize:12,fontWeight:700,color:C.amber}}>{m.qty.toLocaleString()} units</span>
                            {pal>0&&<span style={{fontSize:11,color:C.green,fontWeight:600}}>{pal.toFixed(2)} pal</span>}
                            <span style={{fontSize:11,color:C.muted}}>arrives {m.arrivalDate}</span>
                            <span style={{fontSize:11,color:C.green}}>ready {readyDate}</span>
                            <button onClick={()=>{setManualArrivals(prev=>prev.filter((_,j)=>j!==i));}}
                              style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:16,padding:"0 4px"}}>✕</button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            );
          })()}
          </>}
          <div style={{display:"flex",gap:12,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:C.muted}}>{arrivals.length} containers</span>
            {arrivals.filter(a=>a.qty>0).length===0&&arrivals.length>0&&(
              <Badge color={C.red}>⚠ No Qty found — engine cannot dispatch</Badge>
            )}
            {arrivals.filter(a=>a.qty>0).length>0&&(
              <Badge color={C.green}>✓ {arrivals.filter(a=>a.qty>0).length} with qty · {Math.round(arrivals.reduce((s,a)=>s+(a.qty||0),0)).toLocaleString()} total units</Badge>
            )}
          </div>
          {arrivals.length===0
            ?<div style={{...S.card,textAlign:"center",padding:48,color:C.muted}}>No arrivals loaded.</div>
            :<div className="tbl-scroll">
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr>
                  {["#","Nomenclature code","Nomenclature name","Container","Arrival Date ✎","Ready Date","Qty ★","Pallets"].map(h=>(
                    <th key={h} style={{...S.th,color:h==="Qty ★"?C.amber:undefined}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {arrivals.map((a,i)=>{
                    const nomName=nomenclature[a.sku]?.name||a.name||"";
                    const miss=!a.qty||a.qty===0;
                    return(
                      <tr key={i} style={{background:miss?"#fff5f5":i%2?C.bg:C.surface}}>
                        <td style={{...S.td,color:C.muted}}>{i+1}</td>
                        <td style={{...S.td,color:"#7c3aed",fontFamily:"monospace"}}>{a.sku}</td>
                        <td style={{...S.td,color:C.textSec,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nomName}</td>
                        <td style={S.td}>
                          {a.container
                            ?<span onClick={()=>setExpandedContainer(a.container)}
                              style={{background:C.blueLight,color:C.blue,borderRadius:4,padding:"2px 8px",
                                fontWeight:600,cursor:"pointer",fontSize:11,fontFamily:"monospace"}}>
                              {a.container}</span>
                            :<span style={{color:C.muted}}>—</span>}
                        </td>
                        <td style={S.td}>
                          <input type="date" value={a.arrivalDate||""} disabled={!isAdmin} onChange={e=>isAdmin&&updateArrivalDate(i,e.target.value)}
                            style={{...S.input,width:130,padding:"4px 8px"}}/>
                        </td>
                        <td style={{...S.td,fontWeight:600}}>
                          <span style={{color:isHoliday(a.readyDate)?C.amber:C.green}}>
                            {a.readyDate}
                          </span>
                          {isHoliday(a.readyDate)&&<span style={{fontSize:10,color:C.amber,marginLeft:4}}>🏛 holiday</span>}
                        </td>
                        <td style={{...S.td,fontWeight:700}}>
                          {miss?<span style={{color:C.red,fontSize:11}}>⚠ missing</span>
                               :<span style={{color:C.amber}}>{a.qty.toLocaleString()}</span>}
                        </td>
                        <td style={{...S.td,color:C.muted}}>{(a.availPallets||0).toFixed(2)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>}

          {/* Container detail modal */}
          {expandedContainer&&(()=>{
            const items=arrivals.filter(a=>a.container===expandedContainer);
            const totalQty=items.reduce((s,a)=>s+(a.qty||0),0);
            const totalPal=items.reduce((s,a)=>s+(a.availPallets||0),0);
            return(
              <div onClick={()=>setExpandedContainer(null)}
                style={{position:"fixed",inset:0,background:"#00000040",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
                <div onClick={e=>e.stopPropagation()}
                  style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,
                    width:"100%",maxWidth:900,maxHeight:"80vh",display:"flex",flexDirection:"column",
                    boxShadow:"0 20px 60px #00000030"}}>
                  <div style={{padding:"14px 20px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <span style={{background:C.blueLight,color:C.blue,borderRadius:5,padding:"3px 12px",fontWeight:700,fontSize:12,fontFamily:"monospace"}}>
                      {expandedContainer}
                    </span>
                    <span style={{color:C.textSec,fontSize:12}}>{items.length} items</span>
                    <span style={{color:C.amber,fontWeight:700,fontSize:12,marginLeft:"auto"}}>{Math.round(totalQty).toLocaleString()} units</span>
                    <span style={{color:C.green,fontWeight:700,fontSize:12}}>{totalPal.toFixed(2)} pallets</span>
                    <span style={{color:C.muted,fontSize:12}}>Arrives: {items[0]?.arrivalDate||"—"}</span>
                    <button onClick={()=>setExpandedContainer(null)}
                      style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:18,marginLeft:8}}>✕</button>
                  </div>
                  <div style={{overflowY:"auto",flex:1}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead><tr>
                        {["Nomenclature code","Nomenclature name","Qty","Pallets","Ready Date"].map(h=>(
                          <th key={h} style={S.th}>{h}</th>
                        ))}
                      </tr></thead>
                      <tbody>
                        {items.map((a,i)=>(
                          <tr key={i} style={{background:i%2?C.bg:C.surface}}>
                            <td style={{...S.td,color:"#7c3aed",fontFamily:"monospace"}}>{a.sku}</td>
                            <td style={{...S.td,color:C.textSec}}>{nomenclature[a.sku]?.name||a.name||""}</td>
                            <td style={{...S.td,color:C.amber,fontWeight:700}}>{(a.qty||0).toLocaleString()}</td>
                            <td style={{...S.td,color:C.green}}>{(a.availPallets||0).toFixed(2)}</td>
                            <td style={{...S.td,color:C.green,fontWeight:600}}>{a.readyDate}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>}

        {/* ── DEMAND ── */}
        {tab==="demand"&&(()=>{
          // All destinations from demand
          const allDests=[...new Set(demandForPlan.map(d=>d.destination))].sort();
          const nomEntries=Object.entries(nomenclature);
          const q=(adjForm.search||"").toLowerCase();
          const filtered=q.length>=1?nomEntries.filter(([sku,n])=>
            sku.toLowerCase().includes(q)||(n.name||"").toLowerCase().includes(q)||(n.source||"").toLowerCase().includes(q)
          ).slice(0,40):nomEntries.slice(0,40);
          const selectAdj=(sku,nom)=>setAdjForm(f=>({...f,sku,name:nom?.name||"",search:`${sku} — ${nom?.name||""}`,showDropdown:false}));
          const canAddAdj=adjForm.sku&&adjForm.destination&&adjForm.qty&&Number(adjForm.qty)>0;
          const netBySku={};
          for(const a of demandAdjustments){
            const k=`${a.destination}|${a.sku}`;
            netBySku[k]=(netBySku[k]||0)+(a.direction==="increase"?a.qty:-a.qty);
          }

          const handleAddAdj=()=>{
            if(!canAddAdj) return;
            setAdjError("");
            const qty=Number(adjForm.qty);
            if(adjForm.direction==="decrease"){
              // Check non-dispatched plan has enough qty for this dest+sku
              const available=generatedPlan
                .filter(r=>!r.dispatched && r.destination===adjForm.destination && r.sku===adjForm.sku)
                .reduce((s,r)=>s+r.qty,0);
              const k=`${adjForm.destination}|${adjForm.sku}`;
              const existingNet=netBySku[k]||0;
              const effectiveAvail=available+existingNet;
              if(qty>effectiveAvail){
                setAdjError(`Cannot remove ${qty.toLocaleString()} units — only ${Math.round(effectiveAvail).toLocaleString()} units available in non-dispatched trucks for ${adjForm.sku} → ${adjForm.destination}.`);
                return;
              }

            }
            setDemandAdjustments(prev=>[...prev,{
              id:Date.now(),sku:adjForm.sku,
              name:adjForm.name||nomenclature[adjForm.sku]?.name||adjForm.sku,
              destination:adjForm.destination,direction:adjForm.direction,qty}]);
            setAdjForm(f=>({...f,qty:"",sku:"",name:"",search:"",showDropdown:false,destination:"",destSearch:"",destDropdown:false}));

          };

          return(<div>
          {isAdmin&&<>{/* Adjustment panel */}
          <div style={{...S.card,marginBottom:16}}>
            <div style={{fontSize:11,color:C.muted,fontWeight:600,textTransform:"uppercase",marginBottom:14}}>
              🎚 Demand Adjustment
            </div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-start"}}>

              {/* SKU searchable select */}
              <div style={{position:"relative",minWidth:260,flex:2}}>
                <div style={{fontSize:10,color:C.muted,marginBottom:4}}>Nomenclature</div>
                {adjForm.sku?(
                  <div style={{display:"flex",alignItems:"center",gap:10,
                    background:C.bg,border:`1px solid ${C.blue}`,borderRadius:8,padding:"8px 12px"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:"monospace",fontSize:11,color:"#7c3aed",fontWeight:700}}>{adjForm.sku}</div>
                      <div style={{fontSize:11,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{adjForm.name||nomenclature[adjForm.sku]?.name||""}</div>
                      {nomenclature[adjForm.sku]?.source&&<div style={{fontSize:10,color:C.muted}}>{nomenclature[adjForm.sku].source}</div>}
                    </div>
                    <button onMouseDown={()=>setAdjForm(f=>({...f,sku:"",name:"",search:"",showDropdown:false}))}
                      style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,padding:"0 2px"}}>✕</button>
                  </div>
                ):(
                  <>
                    <input value={adjForm.search}
                      onChange={e=>{setAdjError("");setAdjForm(f=>({...f,search:e.target.value,showDropdown:true,sku:""}));}}
                      onFocus={()=>setAdjForm(f=>({...f,showDropdown:true}))}
                      placeholder="Search by code, name or source…"
                      style={{...S.input,width:"100%"}}/>
                    {adjForm.showDropdown&&filtered.length>0&&(
                      <div style={{position:"absolute",top:"calc(100% + 2px)",left:0,right:0,zIndex:200,
                        background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,
                        boxShadow:"0 8px 24px #00000020",maxHeight:200,overflowY:"auto"}}>
                        {filtered.map(([sku,nom])=>(
                          <div key={sku} onMouseDown={()=>selectAdj(sku,nom)}
                            style={{padding:"7px 12px",cursor:"pointer",borderBottom:`1px solid ${C.border}`,
                              display:"flex",gap:10,alignItems:"center"}}
                            onMouseEnter={e=>e.currentTarget.style.background=C.bg}
                            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <span style={{fontFamily:"monospace",fontSize:10,color:"#7c3aed",minWidth:110,flexShrink:0}}>{sku}</span>
                            <span style={{fontSize:11,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nom.name}</span>
                            {nom.source&&<span style={{fontSize:10,color:C.muted,flexShrink:0,paddingLeft:8}}>{nom.source}</span>}
                          </div>
                        ))}
                      </div>
                    )}
                    {adjForm.showDropdown&&<div style={{position:"fixed",inset:0,zIndex:199}}
                      onClick={()=>setAdjForm(f=>({...f,showDropdown:false}))}/>}
                  </>
                )}
              </div>

              {/* Destination */}
              <div style={{position:"relative",minWidth:200}}>
                <div style={{fontSize:10,color:C.muted,marginBottom:4}}>Destination</div>
                {adjForm.destination?(
                  <div style={{display:"flex",alignItems:"center",gap:10,
                    background:C.bg,border:`1px solid ${C.blue}`,borderRadius:8,padding:"8px 12px"}}>
                    <span style={{fontSize:12,fontWeight:700,color:getWHColor(adjForm.destination),flex:1}}>{adjForm.destination}</span>
                    <button onMouseDown={()=>setAdjForm(f=>({...f,destination:"",destSearch:"",destDropdown:false}))}
                      style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,padding:"0 2px"}}>✕</button>
                  </div>
                ):(
                  <>
                    <input value={adjForm.destSearch||""}
                      onChange={e=>setAdjForm(f=>({...f,destSearch:e.target.value,destDropdown:true}))}
                      onFocus={()=>setAdjForm(f=>({...f,destDropdown:true}))}
                      placeholder="Search location…"
                      style={{...S.input,width:"100%"}}/>
                    {adjForm.destDropdown&&(()=>{
                      const dq=(adjForm.destSearch||"").toLowerCase();
                      const fdests=dq?allDests.filter(d=>d.toLowerCase().includes(dq)):allDests;
                      return fdests.length>0?(
                        <div style={{position:"absolute",top:"calc(100% + 2px)",left:0,right:0,zIndex:200,
                          background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,
                          boxShadow:"0 8px 24px #00000020",maxHeight:200,overflowY:"auto"}}>
                          {fdests.map(d=>(
                            <div key={d} onMouseDown={()=>setAdjForm(f=>({...f,destination:d,destSearch:"",destDropdown:false}))}
                              style={{padding:"8px 12px",cursor:"pointer",borderBottom:`1px solid ${C.border}`,
                                display:"flex",alignItems:"center",gap:8}}
                              onMouseEnter={e=>e.currentTarget.style.background=C.bg}
                              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                              <span style={{width:10,height:10,borderRadius:"50%",flexShrink:0,
                                background:getWHColor(d)}}/>
                              <span style={{fontSize:12,color:C.text}}>{d}</span>
                            </div>
                          ))}
                        </div>
                      ):null;
                    })()}
                    {adjForm.destDropdown&&<div style={{position:"fixed",inset:0,zIndex:199}}
                      onClick={()=>setAdjForm(f=>({...f,destDropdown:false}))}/>}
                  </>
                )}
              </div>

              {/* Adjustment */}
              <div style={{minWidth:160}}>
                <div style={{fontSize:10,color:C.muted,marginBottom:4}}>Adjustment</div>
                <div style={{display:"flex",gap:0,borderRadius:7,overflow:"hidden",border:`1px solid ${C.border}`}}>
                  {["increase","decrease"].map(dir=>(
                    <button key={dir} onClick={()=>{setAdjError("");setAdjForm(f=>({...f,direction:dir}));}}
                      style={{flex:1,padding:"8px 0",border:"none",fontFamily:"inherit",fontSize:12,fontWeight:600,cursor:"pointer",
                        background:adjForm.direction===dir?(dir==="increase"?C.green:C.red):C.bg,
                        color:adjForm.direction===dir?"#fff":C.muted}}>
                      {dir==="increase"?"▲ Add":"▼ Remove"}
                    </button>
                  ))}
                </div>
              </div>

              {/* Qty */}
              <div style={{minWidth:110}}>
                <div style={{fontSize:10,color:C.muted,marginBottom:4}}>Qty</div>
                <input type="number" min={1} value={adjForm.qty}
                  onChange={e=>{setAdjError("");setAdjForm(f=>({...f,qty:parseInt(e.target.value)||""}));}}
                  onKeyDown={e=>e.key==="Enter"&&handleAddAdj()}
                  placeholder="e.g. 100"
                  style={{...S.input,width:"100%"}}/>
              </div>

              <div style={{alignSelf:"flex-end",paddingBottom:1}}>
                <button onClick={handleAddAdj} disabled={!canAddAdj}
                  style={{background:canAddAdj?"linear-gradient(135deg,#2563eb,#7c3aed)":"#e2e8f0",
                    color:canAddAdj?"#fff":C.muted,border:"none",borderRadius:7,padding:"9px 20px",
                    fontFamily:"inherit",fontSize:12,fontWeight:600,cursor:canAddAdj?"pointer":"not-allowed",whiteSpace:"nowrap"}}>
                  ➕ Apply
                </button>
              </div>
            </div>

            {/* Error */}
            {adjError&&(
              <div style={{marginTop:10,padding:"10px 14px",background:"#fff5f5",
                border:`1px solid ${C.red}`,borderRadius:8,fontSize:12,color:C.red,display:"flex",gap:8,alignItems:"flex-start"}}>
                <span style={{fontSize:16,flexShrink:0}}>⚠</span>
                <span>{adjError}</span>
                <button onClick={()=>setAdjError("")} style={{marginLeft:"auto",background:"none",border:"none",
                  color:C.red,cursor:"pointer",fontSize:14,flexShrink:0}}>✕</button>
              </div>
            )}

            {/* Active adjustments list */}
            {demandAdjustments.length>0&&(
              <div style={{marginTop:14,borderTop:`1px solid ${C.border}`,paddingTop:12}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",flex:1}}>
                    Active adjustments — {demandAdjustments.length}
                  </div>
                  <button onClick={()=>{setDemandAdjustments([]);setAdjError("");}}
                    style={{...btn(false),fontSize:11,color:C.red,padding:"3px 10px"}}>Clear all</button>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {demandAdjustments.map((a,i)=>{
                    const nom=nomenclature[a.sku];
                    const pq=nom?.palletQty||0; const ps=nom?.palletSpc||0;
                    const pallets=pq>0&&ps>0?((a.qty/pq)*ps).toFixed(2):null;
                    return(
                      <div key={a.id||i} style={{display:"flex",alignItems:"center",gap:10,
                        background:a.direction==="increase"?"#f0fdf4":"#fff5f5",
                        border:`1px solid ${a.direction==="increase"?C.green:C.red}33`,
                        borderRadius:7,padding:"7px 12px",flexWrap:"wrap"}}>
                        <span style={{fontSize:13,fontWeight:700,color:a.direction==="increase"?C.green:C.red,flexShrink:0}}>
                          {a.direction==="increase"?"▲":"▼"}
                        </span>
                        <span style={{fontFamily:"monospace",fontSize:11,color:"#7c3aed",fontWeight:700,minWidth:100}}>{a.sku}</span>
                        <span style={{fontSize:11,color:C.textSec,flex:1,minWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</span>
                        <Badge color={getWHColor(a.destination)} small>{a.destination}</Badge>
                        <span style={{fontSize:12,fontWeight:700,color:a.direction==="increase"?C.green:C.red}}>
                          {a.direction==="increase"?"+":"-"}{a.qty.toLocaleString()} u
                        </span>
                        {pallets&&<span style={{fontSize:11,color:C.muted,flexShrink:0}}>{pallets} pal</span>}
                        <button onClick={()=>{setDemandAdjustments(prev=>prev.filter((_,j)=>j!==i));setAdjError("");}}
                          style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:15,padding:"0 2px",flexShrink:0}}>✕</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>

          </>}

        {/* ── PLAN ── */}

                              <div style={{width:36,height:4,background:C.border,borderRadius:99,overflow:"hidden"}}>
                                <div style={{width:`${Math.min(100,pct)}%`,height:"100%",background:pc,borderRadius:99}}/>
                              </div>
                              <span style={{fontSize:11,color:pc,fontWeight:700}}>{pct.toFixed(0)}%</span>
                            </div>
                          </td>
                          <td style={{...S.td,color:C.muted,fontSize:11}}>{r.id||"—"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr style={{background:"#f8fafc",borderTop:`2px solid ${C.border}`}}>
                      <td colSpan={5} style={{...S.td,color:C.muted,fontWeight:600}}>TOTAL (filtered)</td>
                      <td style={{...S.td,color:C.amber,fontWeight:700}}>{Math.round(filteredPlan.reduce((s,r)=>s+r.qty,0)).toLocaleString()}</td>
                      <td style={{...S.td,color:C.green,fontWeight:700}}>{filteredPlan.reduce((s,r)=>s+r.pallets,0).toFixed(2)}</td>
                      <td colSpan={5}/>

                  </tfoot>
                </table>

            </>}
        </div>}

        {/* ── ANALYSIS ── */}
        {tab==="warehouse"&&<div>
          {!planGenerated
            ?<div style={{...S.card,textAlign:"center",padding:56,color:C.muted}}>Generate a plan first.</div>
            :<>
              {/* KPIs */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:20}}>
                {[
                  {label:"Demand Qty",   v:Math.round(totalDemandQty).toLocaleString(), c:C.textSec, icon:"📦"},
                  {label:"Alloc Qty",    v:Math.round(totalAllocQty).toLocaleString(),  c:C.green,   icon:"✅"},
                  {label:"Demand Pal",   v:totalDemandPal.toFixed(1),                  c:C.textSec, icon:"📋"},
                  {label:"Alloc Pal",    v:totalAllocPal.toFixed(1),                   c:C.green,   icon:"✅"},
                  {label:"Shortage Pal", v:totalShortage.toFixed(1),                   c:totalShortage>0?C.red:C.green, icon:"⚠️"},
                  {label:"Trucks",       v:truckSummary.length,                         c:C.blue,    icon:"🚛"},
                  {label:"Days",         v:planDates.length,                            c:C.amber,   icon:"📅"},
                ].map(k=>(
                  <div key={k.label} style={{...S.card,textAlign:"center",padding:14}}>
                    <div style={{fontSize:18,marginBottom:4}}>{k.icon}</div>
                    <div style={{fontSize:17,fontWeight:700,color:k.c}}>{k.v}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:3,textTransform:"uppercase"}}>{k.label}</div>
                  </div>
                ))}
              </div>

              {/* Warehouse accumulation — timeline cards */}
              {(()=>{
                const byDate={};
                const skuMeta={};
                let runningTotal=0;
                const allArrivalsForWH=[...arrivals,...manualArrivals.map(m=>{
                  const nom=nomenclature[m.sku];
                  const rawReady=addDays(m.arrivalDate,turnaround);
                  return{sku:m.sku,qty:m.qty,readyDate:nextWorkday(rawReady),
                    nomName:nom?.name||m.sku};
                })];
                for(const a of allArrivalsForWH.filter(x=>x.qty>0)){
                  const d=a.readyDate; if(!d) continue;
                  if(!byDate[d]) byDate[d]={};
                  byDate[d][a.sku]=(byDate[d][a.sku]||0)+a.qty;
                  if(!skuMeta[a.sku]) skuMeta[a.sku]={
                    name:a.nomName||nomenclature[a.sku]?.name||a.sku,
                    palletQty:nomenclature[a.sku]?.palletQty||0,
                    palletSpc:nomenclature[a.sku]?.palletSpc||0};
                }
                const dates=Object.keys(byDate).sort();
                if(!dates.length) return null;

                // Build timeline rows
                const timeline=dates.map(date=>{
                  let dayPal=0;
                  const items=[];
                  for(const [sku,qty] of Object.entries(byDate[date])){
                    const {name,palletQty,palletSpc}=skuMeta[sku]||{};
                    const pal=(palletQty>0&&palletSpc>0)?(qty/palletQty)*palletSpc:0;
                    dayPal+=pal;
                    items.push({sku,name,qty,pal});
                  }
                  items.sort((a,b)=>b.pal-a.pal);
                  runningTotal+=dayPal;
                  return {date,dayPal,runningTotal,items};
                });

                const grandTotal=runningTotal;

                return(
                  <div style={{marginBottom:18}}>
                    <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:14,flexWrap:"wrap"}}>
                      <div style={{fontSize:11,color:C.muted,fontWeight:600,textTransform:"uppercase"}}>
                        📦 Warehouse Accumulation
                      </div>
                      <Badge color={C.blue}>{dates.length} arrival dates</Badge>
                      <Badge color={C.green}>{grandTotal.toFixed(1)} total pallets</Badge>
                    </div>

                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      {timeline.map(({date,dayPal,runningTotal,items},i)=>{
                        const pct=grandTotal>0?(runningTotal/grandTotal)*100:0;
                        return(
                          <div key={date} style={{...S.card,padding:"14px 18px"}}>
                            {/* Date header */}
                            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10,flexWrap:"wrap"}}>
                              <div style={{fontWeight:700,fontSize:13,color:C.blue,minWidth:90}}>{date}</div>
                              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                                <span style={{fontSize:12,fontWeight:700,color:C.green}}>+{dayPal.toFixed(1)} pal</span>
                                <span style={{fontSize:11,color:C.muted}}>arriving</span>
                              </div>
                              <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
                                <span style={{fontSize:11,color:C.muted}}>Cumulative:</span>
                                <span style={{fontSize:13,fontWeight:700,color:C.amber}}>{runningTotal.toFixed(1)} pal</span>
                              </div>
                            </div>

                            {/* Progress bar */}
                            <div style={{height:4,background:C.border,borderRadius:99,marginBottom:12,overflow:"hidden"}}>
                              <div style={{width:`${pct}%`,height:"100%",borderRadius:99,
                                background:`linear-gradient(90deg,${C.blue},${C.green})`}}/>
                            </div>

                            {/* SKU pills */}
                            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                              {items.map(item=>(
                                <div key={item.sku} style={{display:"flex",alignItems:"center",gap:8,
                                  background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,
                                  padding:"6px 12px"}}>
                                  <div>
                                    <div style={{fontSize:10,color:"#7c3aed",fontFamily:"monospace",fontWeight:700}}>{item.sku}</div>
                                    <div style={{fontSize:11,color:C.text,maxWidth:200,whiteSpace:"nowrap",
                                      overflow:"hidden",textOverflow:"ellipsis"}}>{item.name}</div>
                                  </div>
                                  <div style={{borderLeft:`1px solid ${C.border}`,paddingLeft:10,textAlign:"right"}}>
                                    <div style={{fontSize:12,fontWeight:700,color:C.green}}>{item.pal.toFixed(1)} pal</div>
                                    <div style={{fontSize:10,color:C.muted}}>{Math.round(item.qty).toLocaleString()} units</div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}

              {/* USA warehouse */}
              {usaWarehouseItems.length>0&&<div style={{...S.card,marginBottom:18,border:`1px solid ${C.greenBorder}`,background:C.greenLight}}>

                  <Badge color={C.green}>{usaWarehouseItems.length} SKUs</Badge>
                  <Badge color={C.amber}>{Math.round(usaWarehouseItems.reduce((s,d)=>s+d.requiredQty,0)).toLocaleString()} units</Badge>
                  <Badge color={C.green}>{usaWarehouseItems.reduce((s,d)=>s+d.requiredPallets,0).toFixed(1)} pallets</Badge>
                </div>
                <div className="tbl-scroll">
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead><tr>
                      {["Destination","Nomenclature code","Nomenclature name","Req Qty","Req Pallets"].map(h=>(
                        <th key={h} style={S.th}>{h}</th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {usaWarehouseItems.map((d,i)=>(

                          <td style={{...S.td,color:C.green}}>{d.requiredPallets.toFixed(3)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>}

              {/* Shortage table */}
              <div style={{...S.card,marginBottom:18}}>
                <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
                  <div style={{fontSize:11,color:C.muted,fontWeight:600,flex:1,textTransform:"uppercase"}}>Demand vs Allocation — Destination × SKU</div>
                  {[["all","All"],["shortage","Shortages"],["fulfilled","Fulfilled"]].map(([k,l])=>(
                    <button key={k} onClick={()=>setShowShortages(k)} style={btn(showShortages===k)}>{l}</button>
                  ))}
                </div>
                <div className="tbl-scroll">
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead><tr>
                      {["Destination","Nomenclature code","Product","Req Qty","Alloc Qty","Short Qty","Req Pal","Alloc Pal","Short Pal","Fill%"].map(h=>(
                        <th key={h} style={S.th}>{h}</th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {filteredShortages.map((s,i)=>{
                        const fp=s.requiredPallets>0?Math.min(100,(s.allocPallets/s.requiredPallets)*100):100;
                        const hasShort=s.shortagePallets>0.001;
                        return(
                          <tr key={i} style={{background:hasShort?C.redLight:i%2?C.bg:C.surface}}>
                            <td style={S.td}><Badge color={getWHColor(s.destination)} small>{s.destination}</Badge></td>
                            <td style={{...S.td,color:"#7c3aed",fontFamily:"monospace"}}>{s.sku}</td>
                            <td style={{...S.td,color:C.textSec,maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</td>
                            <td style={{...S.td,color:C.amber,fontWeight:700}}>{Math.round(s.requiredQty).toLocaleString()}</td>
                            <td style={{...S.td,color:C.green}}>{Math.round(s.allocQty).toLocaleString()}</td>
                            <td style={{...S.td,color:s.shortageQty>0.5?C.red:C.muted,fontWeight:700}}>
                              {s.shortageQty>0.5?`▼ ${Math.round(s.shortageQty).toLocaleString()}`:"—"}
                            </td>
                            <td style={{...S.td,color:C.muted}}>{s.requiredPallets.toFixed(2)}</td>
                            <td style={{...S.td,color:C.green}}>{s.allocPallets.toFixed(2)}</td>
                            <td style={{...S.td,color:hasShort?C.red:C.muted,fontWeight:700}}>
                              {hasShort?`▼ ${s.shortagePallets.toFixed(2)}`:"—"}
                            </td>
                            <td style={{...S.td,minWidth:90}}>
                              <div style={{display:"flex",alignItems:"center",gap:5}}>
                                <div style={{flex:1,height:4,background:C.border,borderRadius:99,overflow:"hidden"}}>
                                  <div style={{width:`${fp}%`,height:"100%",borderRadius:99,
                                    background:fp>=100?C.green:fp>60?C.amber:C.red}}/>
                                </div>
                                <span style={{fontSize:10,color:C.muted,minWidth:28}}>{fp.toFixed(0)}%</span>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Destination summary */}
              <div style={{...S.card}}>
                <p style={{fontSize:11,color:C.muted,fontWeight:600,textTransform:"uppercase",marginBottom:14}}>Summary by Destination (MEX + CAN)</p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:12}}>
                  {planDests.map(dest=>{
                    const dT=truckSummary.filter(t=>t.destination===dest);
                    const dPal=dT.reduce((s,t)=>s+t.pallets,0);
                    const dQty=dT.reduce((s,t)=>s+t.qty,0);
                    const dDemPal=demandForPlan.filter(d=>d.destination===dest).reduce((s,d)=>s+d.requiredPallets,0);
                    const dDemQty=demandForPlan.filter(d=>d.destination===dest).reduce((s,d)=>s+d.requiredQty,0);
                    const fp=dDemPal>0?Math.min(100,(dPal/dDemPal)*100):100;
                    const wc=getWHColor(dest);
                    return(
                      <div key={dest} style={{background:C.bg,border:`1px solid ${wc}33`,borderRadius:8,padding:14}}>
                        <div style={{fontSize:12,fontWeight:700,color:wc,marginBottom:8,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{dest}</div>
                        {[["Trucks",dT.length,C.text],
                          ["Alloc Qty",Math.round(dQty).toLocaleString(),C.amber],
                          ["Demand Qty",Math.round(dDemQty).toLocaleString(),C.muted],
                          ["Alloc Pal",dPal.toFixed(1),C.green],
                          ["Demand Pal",dDemPal.toFixed(1),C.muted],
                        ].map(([l,v,c])=>(
                          <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginBottom:3}}>
                            <span>{l}</span><span style={{color:c,fontWeight:600}}>{v}</span>
                          </div>
                        ))}
                        <div style={{marginTop:8}}>
                          <div style={{height:3,background:C.border,borderRadius:99,overflow:"hidden"}}>
                            <div style={{width:`${fp}%`,height:"100%",background:fp>=100?C.green:fp>60?C.amber:C.red,borderRadius:99}}/>
                          </div>
                          <div style={{fontSize:10,color:C.muted,marginTop:3,textAlign:"right"}}>{fp.toFixed(0)}% fill</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </>}
        </div>}

      </div>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppWrapper/>);
</script>
</body>
</html>
